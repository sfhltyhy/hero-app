                recognition.continuous = false;
                recognition.interimResults = false;
                recognition.maxAlternatives = 1; 

                recognition.onresult = function(event) {
                    const resultData = event.results[0][0];
                    const resultText = resultData.transcript.trim();
                    const confidence = resultData.confidence;
                    const targetWord = activeWords[currentIndex];
                    const cleanedResult = resultText.replace(/[，。？！、\s]/g, '');
                    
                    speechFeedback.innerText = "聽到： " + cleanedResult + ` (信心: ${Math.round(confidence*100)}%)`;

                    // 核心邏輯：字面必須完全相同，且信心分數必須高於 0.85 避免腦補
                    if (cleanedResult === targetWord && confidence > 0.85) {
                        feedbackCorrect();
                    } else if (cleanedResult === targetWord && confidence <= 0.85) {
                        speechFeedback.innerText = "❌ 讀音唔夠清，試多一次？";
                        playFailSound();
                    } else {
                        feedbackWrong();
                    }
                };
                recognition.onerror = function() { isListening = false; document.getElementById('micBtn').classList.remove('active'); };
                recognition.onend = function() { isListening = false; document.getElementById('micBtn').classList.remove('active'); };
            } else {
                document.getElementById('micBtn').style.display = 'none';
                speechFeedback.innerText = "🚫 瀏覽器不支援語音辨識";
            }
        }

        function startSpeech() {
            if (activeWords.length === 0 || isAutoPlaying || isListening) return;
            isListening = true;
            document.getElementById('micBtn').classList.add('active');
            speechFeedback.innerText = "🎤 讀出嚟...";
            speechFeedback.style.color = "var(--primary)";
            wordDisplay.classList.remove('correct');
            try { recognition.start(); } catch(e) {}
        }

        function stopSpeech() { if (isListening) recognition.stop(); }

        function feedbackCorrect() {
            speechFeedback.innerText = "✅ 準確！自動過關...";
            speechFeedback.style.color = "var(--correct)";
            wordDisplay.classList.add('correct');
            playSuccessSound();
            setTimeout(() => { wordDisplay.classList.remove('correct'); markMastered(); }, 1000);
        }

        function feedbackWrong() {
            speechFeedback.innerText = "❌ 讀錯喇，再試吓？";
            speechFeedback.style.color = "var(--accent)";
            playFailSound();
        }

        function playSuccessSound() {
            const context = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = context.createOscillator();
            const gainNode = context.createGain();
            oscillator.connect(gainNode); gainNode.connect(context.destination);
            oscillator.type = 'sine'; oscillator.frequency.setValueAtTime(880, context.currentTime);
            gainNode.gain.setValueAtTime(0.1, context.currentTime);
            oscillator.start(); oscillator.stop(context.currentTime + 0.15);
        }

        function playFailSound() {
            const context = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = context.createOscillator();
            const gainNode = context.createGain();
            oscillator.connect(gainNode); gainNode.connect(context.destination);
            oscillator.type = 'sine'; oscillator.frequency.setValueAtTime(220, context.currentTime);
            gainNode.gain.setValueAtTime(0.1, context.currentTime);
            oscillator.start(); oscillator.stop(context.currentTime + 0.2);
        }

        function switchGrade(grade) {
            currentGrade = grade;
            document.querySelectorAll('.grade-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${grade}`).classList.add('active');
            currentGroup = Object.keys(db[grade])[0];
            renderTabs(); loadGroup();
        }

        function renderTabs() {
            const container = document.getElementById('groupTabs'); container.innerHTML = '';
            Object.keys(db[currentGrade]).forEach(group => {
                const words = db[currentGrade][group].split(','), remaining = words.filter(w => !masteredSet.has(w)).length;
                const btn = document.createElement('button');
                btn.className = `tab-btn ${remaining === 0 ? 'completed' : 'pending'} ${group === currentGroup ? 'active' : ''}`;
                btn.innerText = group;
                btn.onclick = () => { currentGroup = group; renderTabs(); loadGroup(); };
                container.appendChild(btn);
            });
        }

        function loadGroup() {
            const allWords = db[currentGrade][currentGroup].split(',');
            activeWords = allWords.filter(w => !masteredSet.has(w));
            currentIndex = 0;
            if (activeWords.length === 0) {
                document.getElementById('finishOverlay').style.display = 'flex';
                document.getElementById('wordDisplay').innerText = "";
                document.getElementById('masterBtn').style.display = 'none';
                document.getElementById('micBtn').style.display = 'none';
                if(isAutoPlaying) toggleAutoPlay();
            } else {
                document.getElementById('finishOverlay').style.display = 'none';
                document.getElementById('masterBtn').style.display = 'block';
                if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) document.getElementById('micBtn').style.display = 'block';
                displayWord();
            }
        }

        function displayWord() {
            if (activeWords.length > 0) {
                const word = activeWords[currentIndex];
                document.getElementById('wordDisplay').innerText = word;
                if (isAutoPlaying) speak(word);
                speechFeedback.innerText = "";
                wordDisplay.classList.remove('correct');
            }
        }

        function markMastered() {
            const word = activeWords[currentIndex]; if (!word) return;
            masteredSet.add(word); saveLocal(); renderTabs(); loadGroup(); updateStats();
        }

        function updateStats() {
            const count = masteredSet.size;
            const percent = Math.round((count / TOTAL_WORDS) * 100);
            document.getElementById('totalStat').innerHTML = `戰力：${count} <span style="font-weight:normal; font-size:0.9rem; color:#7f8c8d;">(${percent}%)</span>`;
        }

        function resetCurrentLevel() {
            if (confirm("重置「" + currentGroup + "」進度？")) {
                db[currentGrade][currentGroup].split(',').forEach(w => masteredSet.delete(w));
                saveLocal(); renderTabs(); loadGroup(); updateStats(); closeModal();
            }
        }

        function toggleAutoPlay() {
            if (isListening) return;
            if (isAutoPlaying) { 
                isAutoPlaying = false; clearInterval(playInterval); document.getElementById('playBtn').innerText = "▶ 自動"; 
            } else {
                if (activeWords.length === 0) return;
                isAutoPlaying = true; document.getElementById('playBtn').innerText = "⏸ 暫停";
                playInterval = setInterval(() => {
                    if (activeWords.length > 0) { currentIndex = (currentIndex + 1) % activeWords.length; displayWord(); }
                    else { toggleAutoPlay(); }
                }, parseFloat(document.getElementById('speed').value) * 1000);
                displayWord();
            }
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'zh-HK'; window.speechSynthesis.speak(msg);
        }

        function saveLocal() { localStorage.setItem('HERO_DATA_V5_6', JSON.stringify([...masteredSet])); }

        function openPreview() {
            if (isAutoPlaying) toggleAutoPlay();
            const grid = document.getElementById('wordListGrid'); grid.innerHTML = '';
            db[currentGrade][currentGroup].split(',').forEach(w => {
                const item = document.createElement('div');
                item.className = `word-item ${masteredSet.has(w) ? 'learned' : ''}`;
                item.innerText = w; grid.appendChild(item);
            });
            document.getElementById('modalTitle').innerText = `預覽：${currentGroup}`;
            document.getElementById('wordModal').style.display = "block";
        }
        function closeModal() { document.getElementById('wordModal').style.display = "none"; }

        init();
    </script>
</body>
</html>
