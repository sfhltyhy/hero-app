<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>認字英雄 v5.6 Lite</title>
    <style>
        :root { --p: #3d5a80; --bg: #f8f9fa; --a: #ee6c4d; --ok: #2ecc71; --mic: #e74c3c; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: var(--bg); padding: 10px; text-align: center; }
        .total-stat { color: var(--a); font-weight: bold; margin-bottom: 5px; }
        .grade-nav { display: flex; gap: 2px; margin-bottom: 10px; }
        .grade-btn { flex: 1; padding: 10px 0; border: 1px solid var(--p); background: #fff; border-radius: 8px; font-size: 0.7rem; cursor: pointer; }
        .grade-btn.active { background: var(--p); color: #fff; }
        .group-tabs { display: flex; gap: 5px; overflow-x: auto; padding: 5px; margin-bottom: 10px; }
        .tab-btn { padding: 8px 15px; border-radius: 12px; border: none; white-space: nowrap; font-size: 0.8rem; }
        .tab-btn.active { background: var(--a); color: #fff; }
        .flash-card { width: 100%; height: 40vh; background: #fff; border-radius: 25px; display: flex; flex-direction: column; justify-content: center; align-items: center; box-shadow: 0 5px 15px rgba(0,0,0,0.1); position: relative; margin-bottom: 10px; border: 4px solid #fff; }
        .word-display { font-size: 5rem; font-weight: bold; transition: 0.3s; }
        .word-display.ok { color: var(--ok); }
        .btn-m { padding: 12px 30px; background: #4caf50; color: #fff; border: none; border-radius: 30px; font-weight: bold; font-size: 1.2rem; cursor: pointer; }
        .ctrl { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; background: #fff; padding: 10px; border-radius: 20px; }
        .btn { padding: 8px 12px; border: none; border-radius: 8px; font-weight: bold; font-size: 0.8rem; cursor: pointer; color: #fff; }
        .mic { background: #3498db; flex-grow: 1; font-size: 1rem; }
        .mic.active { background: var(--mic); }
    </style>
</head>
<body>
    <div class="total-stat" id="stat">戰力：0 (0%)</div>
    <div class="grade-nav" id="gNav"></div>
    <div class="group-tabs" id="tabs"></div>
    <div class="flash-card">
        <div id="word" class="word-display">載入中</div>
        <button class="btn-m" onclick="mark()">✅ 我識啦</button>
    </div>
    <div class="ctrl">
        <div style="font-size:0.8rem">⏱️<input type="number" id="spd" value="1.5" step="0.1" style="width:35px">s</div>
        <button class="btn" style="background:#27ae60" onclick="exp()">📤 導出</button>
        <button class="btn" style="background:#2980b9" onclick="imp()">📥 導入</button>
        <button class="btn" style="background:#9b59b6" onclick="toggleP()">▶ 自動</button>
        <button class="btn mic" id="mBtn" ontouchstart="startS()" ontouchend="stopS()">🎤 按住認讀</button>
    </div>
    <div id="feed" style="margin-top:10px; font-size:0.8rem; font-weight:bold"></div>

            'P3': { '情緒心態': "興奮,難過,焦急,驚奇,懷疑,驕傲,慚愧,慶幸,盼望,思念,感動,委屈,憤怒,平靜,得意,害怕,擔憂,滿意,後悔,驚訝,傷心,愉快,煩惱,痛快,焦慮,親切,溫柔,憤恨,遺憾,痛心,失望,絕望,振奮,驚慌,害羞,寬慰", '描寫感官': "繁華,寧靜,壯觀,朦朧,翠綠,茂盛,凋謝,清脆,寬闊,狹窄,陡峭,崎嶇,清澈,湛藍,五光十色,柔軟,堅硬,粗糙,平滑,細緻,鮮艷,灰暗,透明,沉重,輕巧,濃郁,清淡,刺耳,芬芳,冰冷,滾燙,倒影,環繞,延綿,遼闊", '故事敘述': "從前,神奇,魔幻,仙女,城堡,森林,怪物,變幻,願望,善良,邪惡,報答,誠實,結果,後來,突然,竟然,果然,最後,經歷,解決,希望,夢想,道理,困難,容易,珍惜,浪費,保護,破壞,重要,特別,發現,觀察,試驗,結局,遭遇", '地理動作': "高山,深谷,河流,海洋,平原,島嶼,沙漠,瀑布,泉水,港口,沙灘,懸崖,叢林,溪流,湖泊,山脈,盆地,丘陵,濕地,旋轉,搖晃,跳動,擺動,滑行,飛翔,降落,漂浮,沉沒,燃燒,爆炸,分裂,結合,掩護,進攻,防守,追逐" },
            'P4': { '人物性格': "慈祥,嚴厲,和藹,剛強,內向,外向,謙虛,傲慢,機靈,穩重,馬虎,細心,慷慨,吝嗇,感激,憐憫,同情,懷念,敬佩,羨慕,嫉妒,厭惡,原諒,信任,孤獨,毅力,果斷,正直,奸詐,頑強,平易近人,默默無聞,堅持不懈,不屈不撓", '常用成語A': "一心一意,自言自語,五顏六色,走馬看花,目瞪口呆,大公無私,力不從心,半途而廢,名列前茅,垂頭喪氣,胸有成竹,得意洋洋,破口大罵,悶悶不樂,視而不見,無影無蹤,萬眾一心,情不自禁,千變萬化,大海撈針,守口如瓶", '常用成語B': "廢寢忘食,驚心動魄,隨遇而安,異想天開,出口成章,入木三分,名副其實,大言不慚,不知所措,以身作則,因材施教,老馬識途,再接再厲,百折不撓,自強不息,忍辱負重,走投無路,其貌不揚,刻骨銘心,念念不忘", '修辭寫作': "如同,彷彿,閃爍,襯托,比喻,生動,感人,層次,細膩,描繪,總結,鋪陳,擬人,誇張,對比,排比,反問,設問,呼應,過渡,聯想,引用,渲染,側寫,伏筆,精煉,流暢,生澀,含蓄,直白,主旨,段落,概括,結構,昇華,意象" },
            'P5': { '思想議論': "價值,意義,態度,信念,理想,意志,勇氣,智慧,磨練,考驗,機遇,挑戰,趨勢,貢獻,傳統,革新,責任感,榮譽感,包容,和諧,正義,公理,邏輯,偏見,主觀,客觀,判斷,選擇,決定,後果,目標,實踐,恆心,毅力,反省", '寫作藝術': "映襯,鋪墊,反思,感悟,意境,昇華,象徵,側寫,烘托,扣人心弦,精雕細琢,引人入勝,言簡意賅,惟妙惟肖,妙筆生花,畫龍點睛,別開生面,不落俗套,意蘊深長,層次分明,首尾呼應,跌宕起伏,感人肺腑,嘆為觀止", '社會生態': "慶祝,節日,秩序,繁榮,落後,競爭,合作,分配,義務,權利,福利,建設,發展,資源,保育,污染,氣候變遷,多樣性,演化,繁衍,棲息,滅絕,平衡,循環,再生,減少,廢物,能源,低碳,綠色生活,危機,共識,政策,意識", '綜合進階成語': "不可思議,不勞而獲,心曠神怡,見義勇為,言行一致,刻苦耐勞,理直氣壯,落井下石,精益求精,語重心長,鍥而不捨,驚慌失措,舉一反三,隨機應變,實事求是,堅持不懈,赴湯蹈火,指鹿為馬,望洋興嘆,聞雞起舞" },
            'P6': { '高階成語集': "前程似錦,後會有期,萍水相逢,朝夕相對,患難與共,捨己為人,推陳出新,袖手旁觀,肅然起敬,微不足道,雷厲風行,慷慨解囊,應接不暇,獲益匪淺,難能可貴,瞻前顧後,離鄉別井,飲水思源,學富五車,默默耕耘,自討苦吃,得寸進尺", '治理社會': "趨勢,革新,治理,政策,和諧,永續,全球化,競爭力,優勢,劣勢,關鍵,轉型,展望,民主,法治,義務,公民,權利,爭議,平衡,協調,衝突,改善,效率,指標,監督,評估,透明度,公共利益,社區意識,人權,發展路徑,多元化", '文學意境': "惆悵,眷戀,釋懷,沉鬱,慨嘆,欣慰,徬徨,羞赧,焦躁,淡泊,懷舊,憧憬,身歷其境,感觸,唏噓,昂揚,憂傷,喜悅,空靈,質樸,華麗,冷峻,奔放,激昂,平實,深奧,淺顯,晦澀,明快,優美,細膩,粗獷,幽默,諷刺,真實,虛幻", '畢業情懷': "同窗,恩師,勉勵,前途,回憶,珍重,揚帆,啟航,奮鬥,光陰,不捨,踏實,前進,志向,抱負,信念,勇往直前,白駒過隙,光陰似箭,歲月流逝,難忘,純真,友情,離情依依,繼往開來,自強不息,宏偉,目標,成就,感激,祝福,夢想成真" },
            'Exam': { '通用指令': "判斷,分析,解釋,列舉,歸納,比較,對照,選出,填寫,圈出,劃線,修正,補充,根據,引用,理由,原因,結果,影響,異同,特點,特徵,適當,錯誤,正確,正確答案,下列,以上,未必,必定,可能,顯示,反映,關鍵", '中文閱卷': "主旨,中心思想,段意,承上啟下,伏筆,呼應,性格,心情,描寫,感受,啟發,體會,寓意,比喻,本體,喻體,擬人,排比,對比,誇張,反問,設問,疊字,對偶,感官,視覺,聽覺,嗅覺", '數常邏輯': "相差,共,餘下,平分,平均,原本,現有,倍數,一半,增加,減少,求,計算,驗算,列式,橫式,直式,單位,估算,實驗,觀察,記錄,結論,公平,變量,假設,功能,構造,演變,趨勢,資料,圖表,比例,分配,資源,環保,責任,權利,義務", '高階手法': "借代,反襯,雙關,層遞,頂真,聯想,想像,象徵,反語,開門見山,卒章顯志,寓情於景,借景抒情,托物言志,先抑後揚,側面描寫,行動描寫,心理描寫" }
        };

        let curG = 'P2', curGrp = '', words = [], idx = 0, isP = false, timer, rec;
        let learned = new Set(JSON.parse(localStorage.getItem('HERO_V5') || "[]"));

        function init() {
            const nav = document.getElementById('gNav');
            Object.keys(db).forEach(g => {
                const b = document.createElement('button'); b.className = 'grade-btn'; b.innerText = g; b.id = 'g'+g;
                b.onclick = () => { curG = g; Array.from(nav.children).forEach(x=>x.classList.remove('active')); b.classList.add('active'); curGrp = Object.keys(db[g])[0]; load(); };
                nav.appendChild(b);
            });
            document.getElementById('gP2').click(); setupRec();
        }

        function load() {
            const ts = document.getElementById('tabs'); ts.innerHTML = '';
            Object.keys(db[curG]).forEach(gp => {
                const b = document.createElement('button'); b.className = `tab-btn ${gp===curGrp?'active':''}`; b.innerText = gp;
                b.onclick = () => { curGrp = gp; load(); }; ts.appendChild(b);
            });
            words = db[curG][curGrp].split(',').filter(w => !learned.has(w));
            idx = 0; show(); updateS();
        }

        function show() {
            const d = document.getElementById('word');
            if (words.length > 0) { d.innerText = words[idx]; if(isP) speak(words[idx]); }
            else { d.innerText = "完！"; if(isP) toggleP(); }
            document.getElementById('feed').innerText = "";
        }

        function mark() { if(!words[idx]) return; learned.add(words[idx]); localStorage.setItem('HERO_V5', JSON.stringify([...learned])); load(); }

        function updateS() {
            let total = 0; Object.values(db).forEach(g => Object.values(g).forEach(w => total += w.split(',').length));
            document.getElementById('stat').innerText = `戰力：${learned.size} (${Math.round(learned.size/total*100)}%)`;
        }

        function toggleP() {
            isP = !isP; document.getElementById('word').innerText = isP ? words[idx] : document.getElementById('word').innerText;
            if(isP) timer = setInterval(() => { idx = (idx+1)%words.length; show(); }, document.getElementById('spd').value*1000);
            else clearInterval(timer);
        }

        function speak(t) { window.speechSynthesis.cancel(); const m = new SpeechSynthesisUtterance(t); m.lang = 'zh-HK'; window.speechSynthesis.speak(m); }

        function setupRec() {
            if (!('webkitSpeechRecognition' in window)) return;
            rec = new webkitSpeechRecognition(); rec.lang = 'zh-HK'; rec.onresult = (e) => {
                const res = e.results[0][0], t = res.transcript.trim().replace(/\s/g,''), conf = res.confidence;
                document.getElementById('feed').innerText = `聽：${t} (${Math.round(conf*100)}%)`;
                if (t === words[idx] && conf > 0.85) { document.getElementById('word').classList.add('ok'); setTimeout(()=>{document.getElementById('word').classList.remove('ok'); mark();}, 800); }
            };
            const b = document.getElementById('mBtn'); rec.onstart = () => b.classList.add('active'); rec.onend = () => b.classList.remove('active');
        }
        function startS() { try{rec.start();}catch(e){} }
        function stopS() { rec.stop(); }

        // 文字版 Export/Import
        function exp() {
            const code = btoa(JSON.stringify([...learned])); // 用 Base64 縮短代碼
            prompt("請複製以下戰力代碼：", code);
        }
        function imp() {
            const code = prompt("請貼上戰力代碼：");
            if (code) {
                try {
                    learned = new Set(JSON.parse(atob(code)));
                    localStorage.setItem('HERO_V5', JSON.stringify([...learned]));
                    location.reload();
                } catch(e) { alert("代碼無效！"); }
            }
        }

        init();
    </script>
</body>
</html>
